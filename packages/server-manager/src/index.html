<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>ERP Server Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 1.5rem;
      color: #4fc3f7;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 25px;
    }
    .status-panel {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .status-row:last-child {
      border-bottom: none;
    }
    .status-label {
      font-weight: 500;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .status-dot.running {
      background: #4caf50;
      box-shadow: 0 0 10px #4caf50;
    }
    .status-dot.stopped {
      background: #f44336;
      box-shadow: 0 0 10px #f44336;
      animation: none;
    }
    .status-dot.starting {
      background: #ff9800;
      box-shadow: 0 0 10px #ff9800;
    }
    .status-dot.error {
      background: #f44336;
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .button-row {
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4fc3f7, #29b6f6);
      color: #000;
    }
    .btn-success {
      background: linear-gradient(135deg, #66bb6a, #43a047);
      color: #fff;
    }
    .btn-warning {
      background: linear-gradient(135deg, #ffca28, #ffa726);
      color: #000;
    }
    .btn-danger {
      background: linear-gradient(135deg, #ef5350, #e53935);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 0.8rem;
    }
    .footer a {
      color: #4fc3f7;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖥️ ERP Server Manager</h1>
    <p class="subtitle">Wilde Signs ERP Workflow</p>

    <div class="status-panel">
      <div class="status-row">
        <span class="status-label">Backend API (Port 8001)</span>
        <div class="status-indicator">
          <span id="backend-status-text">Checking...</span>
          <div id="backend-status" class="status-dot stopped"></div>
        </div>
      </div>
      <div class="status-row">
        <span class="status-label">Frontend (Port 5173)</span>
        <div class="status-indicator">
          <span id="frontend-status-text">Checking...</span>
          <div id="frontend-status" class="status-dot stopped"></div>
        </div>
      </div>
    </div>

    <div class="button-group">
      <button id="btn-start" class="btn-success">▶️ Start All Servers</button>
      
      <div class="button-row">
        <button id="btn-restart-all" class="btn-warning">🔄 Restart All</button>
        <button id="btn-stop" class="btn-danger">⏹️ Stop All</button>
      </div>

      <div class="button-row">
        <button id="btn-restart-backend" class="btn-secondary">🔄 Restart Backend</button>
        <button id="btn-restart-frontend" class="btn-secondary">🔄 Restart Frontend</button>
      </div>

      <button id="btn-open" class="btn-primary">🌐 Open Application</button>
    </div>

    <p class="footer">
      Servers continue running when this window is closed.<br>
      Right-click the system tray icon for quick access.
    </p>
  </div>

  <script>
    const backendStatus = document.getElementById('backend-status');
    const frontendStatus = document.getElementById('frontend-status');
    const backendText = document.getElementById('backend-status-text');
    const frontendText = document.getElementById('frontend-status-text');

    function updateStatusDisplay(status) {
      // Backend
      backendStatus.className = 'status-dot ' + status.backend;
      backendText.textContent = status.backend.charAt(0).toUpperCase() + status.backend.slice(1);
      
      // Frontend
      frontendStatus.className = 'status-dot ' + status.frontend;
      frontendText.textContent = status.frontend.charAt(0).toUpperCase() + status.frontend.slice(1);
    }

    // Button handlers
    document.getElementById('btn-start').onclick = async () => {
      const status = await window.electronAPI.startServers();
      updateStatusDisplay(status);
    };

    document.getElementById('btn-stop').onclick = async () => {
      const status = await window.electronAPI.stopServers();
      updateStatusDisplay(status);
    };

    document.getElementById('btn-restart-all').onclick = async () => {
      const status = await window.electronAPI.restartServer('all');
      updateStatusDisplay(status);
    };

    document.getElementById('btn-restart-backend').onclick = async () => {
      const status = await window.electronAPI.restartServer('backend');
      updateStatusDisplay(status);
    };

    document.getElementById('btn-restart-frontend').onclick = async () => {
      const status = await window.electronAPI.restartServer('frontend');
      updateStatusDisplay(status);
    };

    document.getElementById('btn-open').onclick = () => {
      window.electronAPI.openFrontend();
    };

    // Listen for status updates
    window.electronAPI.onStatusUpdate(updateStatusDisplay);

    // Get initial status
    window.electronAPI.getStatus().then(updateStatusDisplay);
  </script>
</body>
</html>
